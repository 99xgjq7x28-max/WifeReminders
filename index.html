<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f3ec">
  <title>Spouse Nudge</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <main class="phone-shell" aria-label="Spouse Nudge task reminder app">
    <section class="topbar">
      <div>
        <p class="eyebrow" data-i18n="eyebrow">Annoying spouse mode</p>
        <h1 data-i18n="title">Did you do it already?</h1>
      </div>
      <label class="language-control" for="language">
        <span data-i18n="language">Language</span>
        <select id="language" aria-label="Language">
          <option value="en">EN</option>
          <option value="sk">SK</option>
        </select>
      </label>
    </section>

    <section class="hero-panel">
      <div class="spouse-card">
        <div class="spouse-figure" aria-hidden="true">
          <svg viewBox="0 0 220 260" role="img">
            <defs>
              <clipPath id="spouseBodyClip">
                <path d="M61 245c6-58 23-93 49-93s43 35 49 93H61Z" />
              </clipPath>
            </defs>
            <path class="hair" d="M56 95c0-44 24-75 57-75s54 29 54 74c0 39-22 73-55 73S56 135 56 95Z" />
            <circle class="face" cx="112" cy="91" r="47" />
            <path class="hair-front" d="M72 80c19-9 35-24 43-43 8 21 22 33 39 42-4-36-21-55-43-55C88 24 73 44 72 80Z" />
            <path id="leftBrow" class="brow" d="M86 78l19 6" />
            <path id="rightBrow" class="brow" d="M119 84l19-6" />
            <circle class="eye" cx="96" cy="92" r="4" />
            <circle class="eye" cx="129" cy="92" r="4" />
            <path id="spouseMouth" class="mouth" d="M94 123c9-10 29-10 38 0" />
            <path class="arm left-arm" d="M78 172c-24 15-38 36-42 64" />
            <path class="arm right-arm" d="M146 172c24 15 38 36 42 64" />
            <path class="body-bg" d="M61 245c6-58 23-93 49-93s43 35 49 93H61Z" />
            <g clip-path="url(#spouseBodyClip)">
              <rect id="spouseFill" class="body-fill" x="55" y="245" width="115" height="0" />
            </g>
            <path class="body-line" d="M61 245c6-58 23-93 49-93s43 35 49 93H61Z" />
            <path class="necklace" d="M91 166c11 11 28 11 39 0" />
          </svg>
        </div>
        <div class="happiness">
          <span data-i18n="happiness">Spouse happiness</span>
          <strong id="happyPercent">0%</strong>
        </div>
        <div class="meter" aria-hidden="true"><span id="happyBar"></span></div>
      </div>

      <div class="speech-card" aria-live="polite">
        <p id="spouseLine">Add a task and I will start lovingly judging you.</p>
        <button id="randomNag" type="button" data-i18n="randomNag">Nag me</button>
      </div>
    </section>

    <nav class="tabs" aria-label="Sections">
      <button class="tab active" type="button" data-tab="today" data-i18n="tabToday">Today</button>
      <button class="tab" type="button" data-tab="sitting" data-i18n="tabSitting">Sitting</button>
      <button class="tab" type="button" data-tab="sources" data-i18n="tabSources">Calendar</button>
    </nav>

    <section id="today" class="screen active">
      <form id="taskForm" class="task-form">
        <label for="taskText" data-i18n="taskLabel">New task</label>
        <div class="input-row">
          <input id="taskText" name="taskText" type="text" autocomplete="off" data-i18n-placeholder="taskPlaceholder" placeholder="Call dentist, send invoice..." required>
          <button type="submit" data-i18n="add">Add</button>
        </div>
        <div class="input-grid">
          <label>
            <span data-i18n="when">When</span>
            <input id="taskTime" name="taskTime" type="text" inputmode="numeric" maxlength="5" pattern="^([01][0-9]|2[0-3]):[0-5][0-9]$" data-i18n-placeholder="timePlaceholder" placeholder="14:00">
          </label>
          <label>
            <span data-i18n="tone">Tone</span>
            <select id="taskTone" name="taskTone">
              <option value="sweet" data-i18n="toneSweet">Sweet nag</option>
              <option value="spicy" data-i18n="toneSpicy">Spicy spouse</option>
            </select>
          </label>
        </div>
        <button id="enableNotifications" class="secondary-action" type="button" data-i18n="enableNotifications">Enable notifications</button>
      </form>
      <div id="tasks" class="task-list" aria-live="polite"></div>
    </section>

    <section id="sitting" class="screen">
      <div class="timer-card">
        <p data-i18n="sittingIntro">Sitting timer</p>
        <strong id="sittingTime">00:00</strong>
        <div class="timer-actions">
          <button id="sitStart" type="button" data-i18n="start">Start</button>
          <button id="standNow" type="button" data-i18n="stoodUp">I stood up</button>
        </div>
        <label class="range-label" for="sitLimit">
          <span data-i18n="sitLimit">Nudge after minutes</span>
          <output id="sitLimitValue">40</output>
        </label>
        <input id="sitLimit" type="range" min="5" max="60" step="5" value="40">
      </div>
    </section>

    <section id="sources" class="screen">
      <div class="source-grid">
        <article class="source-card">
          <div>
            <h2 data-i18n="calendarTitle">Calendar</h2>
            <p data-i18n="calendarCopy">Ask iPhone for real Calendar access through EventKit.</p>
          </div>
          <button id="syncCalendar" type="button" data-i18n="connect">Connect</button>
        </article>
        <article class="source-card">
          <div>
            <h2 data-i18n="remindersTitle">Reminders</h2>
            <p data-i18n="remindersCopy">Ask iPhone for real Reminders access through EventKit.</p>
          </div>
          <button id="syncReminders" type="button" data-i18n="connect">Connect</button>
        </article>
      </div>
      <div id="imported" class="imported-list"></div>
    </section>
    </main>
  </div>
  <script src="./app.js"></script>
</body>
</html>
